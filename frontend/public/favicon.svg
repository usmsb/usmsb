<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="favGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="favAccent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0f0f23"/>

  <!-- Hexagon core -->
  <polygon points="16,6 24,11 24,21 16,26 8,21 8,11" fill="url(#favGradient)"/>

  <!-- Inner highlight -->
  <polygon points="16,9 21,12 21,20 16,23 11,20 11,12" fill="none" stroke="white" stroke-width="1" opacity="0.7"/>

  <!-- Neural dot -->
  <circle cx="16" cy="16" r="2" fill="white" opacity="0.9"/>

  <!-- Connection nodes at corners -->
  <circle cx="16" cy="6" r="1.5" fill="url(#favAccent)"/>
  <circle cx="24" cy="11" r="1.5" fill="url(#favAccent)"/>
  <circle cx="24" cy="21" r="1.5" fill="url(#favAccent)"/>
  <circle cx="16" cy="26" r="1.5" fill="url(#favAccent)"/>
  <circle cx="8" cy="21" r="1.5" fill="url(#favAccent)"/>
  <circle cx="8" cy="11" r="1.5" fill="url(#favAccent)"/>
</svg>
