<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Primary gradient - AI tech blue to purple -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>

    <!-- Secondary gradient - accent -->
    <linearGradient id="secondaryGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Node glow -->
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle with subtle gradient -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.3"/>

  <!-- Outer connection ring - 9 nodes representing USMSB elements -->
  <g filter="url(#glow)" opacity="0.8">
    <!-- Connection lines from center to outer nodes -->
    <line x1="256" y1="256" x2="256" y2="100" stroke="url(#secondaryGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="256" y1="256" x2="370" y2="137" stroke="url(#secondaryGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="256" y1="256" x2="412" y2="256" stroke="url(#secondaryGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="256" y1="256" x2="370" y2="375" stroke="url(#secondaryGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="256" y1="256" x2="256" y2="412" stroke="url(#secondaryGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="256" y1="256" x2="142" y2="375" stroke="url(#secondaryGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="256" y1="256" x2="100" y2="256" stroke="url(#secondaryGradient)" stroke-width="2" opacity="0.6"/>
    <line x1="256" y1="256" x2="142" y2="137" stroke="url(#secondaryGradient)" stroke-width="2" opacity="0.6"/>

    <!-- Circular connections between nodes -->
    <circle cx="256" cy="256" r="156" fill="none" stroke="url(#primaryGradient)" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.5"/>
  </g>

  <!-- Central hexagon core - AI brain -->
  <g filter="url(#glow)">
    <polygon points="256,180 320,218 320,294 256,332 192,294 192,218"
             fill="url(#primaryGradient)" opacity="0.9"/>
    <polygon points="256,200 300,228 300,284 256,312 212,284 212,228"
             fill="none" stroke="white" stroke-width="1.5" opacity="0.8"/>
  </g>

  <!-- Inner neural network pattern -->
  <g opacity="0.6">
    <circle cx="256" cy="240" r="4" fill="white"/>
    <circle cx="240" cy="265" r="3" fill="white"/>
    <circle cx="272" cy="265" r="3" fill="white"/>
    <circle cx="256" cy="280" r="3" fill="white"/>
    <line x1="256" y1="240" x2="240" y2="265" stroke="white" stroke-width="1"/>
    <line x1="256" y1="240" x2="272" y2="265" stroke="white" stroke-width="1"/>
    <line x1="240" y1="265" x2="256" y2="280" stroke="white" stroke-width="1"/>
    <line x1="272" y1="265" x2="256" y2="280" stroke="white" stroke-width="1"/>
  </g>

  <!-- 9 outer nodes representing USMSB elements -->
  <g filter="url(#nodeGlow)">
    <!-- Node 1 - Top -->
    <circle cx="256" cy="100" r="16" fill="url(#secondaryGradient)"/>
    <circle cx="256" cy="100" r="8" fill="white" opacity="0.8"/>

    <!-- Node 2 - Top Right -->
    <circle cx="370" cy="137" r="16" fill="url(#secondaryGradient)"/>
    <circle cx="370" cy="137" r="8" fill="white" opacity="0.8"/>

    <!-- Node 3 - Right -->
    <circle cx="412" cy="256" r="16" fill="url(#secondaryGradient)"/>
    <circle cx="412" cy="256" r="8" fill="white" opacity="0.8"/>

    <!-- Node 4 - Bottom Right -->
    <circle cx="370" cy="375" r="16" fill="url(#secondaryGradient)"/>
    <circle cx="370" cy="375" r="8" fill="white" opacity="0.8"/>

    <!-- Node 5 - Bottom -->
    <circle cx="256" cy="412" r="16" fill="url(#secondaryGradient)"/>
    <circle cx="256" cy="412" r="8" fill="white" opacity="0.8"/>

    <!-- Node 6 - Bottom Left -->
    <circle cx="142" cy="375" r="16" fill="url(#secondaryGradient)"/>
    <circle cx="142" cy="375" r="8" fill="white" opacity="0.8"/>

    <!-- Node 7 - Left -->
    <circle cx="100" cy="256" r="16" fill="url(#secondaryGradient)"/>
    <circle cx="100" cy="256" r="8" fill="white" opacity="0.8"/>

    <!-- Node 8 - Top Left -->
    <circle cx="142" cy="137" r="16" fill="url(#secondaryGradient)"/>
    <circle cx="142" cy="137" r="8" fill="white" opacity="0.8"/>
  </g>

  <!-- Text: USMSB -->
  <text x="256" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#primaryGradient)" letter-spacing="8">USMSB</text>
</svg>
