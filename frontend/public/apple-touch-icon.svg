<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="touchGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="touchAccent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="touchGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="#0f0f23"/>

  <!-- Hexagon core -->
  <g filter="url(#touchGlow)">
    <polygon points="90,35 135,60 135,120 90,145 45,120 45,60" fill="url(#touchGradient)"/>
  </g>

  <!-- Inner pattern -->
  <polygon points="90,50 120,70 120,110 90,130 60,110 60,70" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>

  <!-- Neural network dots -->
  <circle cx="90" cy="80" r="5" fill="white" opacity="0.9"/>
  <circle cx="75" cy="100" r="4" fill="white" opacity="0.8"/>
  <circle cx="105" cy="100" r="4" fill="white" opacity="0.8"/>
  <line x1="90" y1="80" x2="75" y2="100" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="90" y1="80" x2="105" y2="100" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="75" y1="100" x2="105" y2="100" stroke="white" stroke-width="1.5" opacity="0.6"/>

  <!-- Connection nodes -->
  <circle cx="90" cy="35" r="6" fill="url(#touchAccent)"/>
  <circle cx="135" cy="60" r="6" fill="url(#touchAccent)"/>
  <circle cx="135" cy="120" r="6" fill="url(#touchAccent)"/>
  <circle cx="90" cy="145" r="6" fill="url(#touchAccent)"/>
  <circle cx="45" cy="120" r="6" fill="url(#touchAccent)"/>
  <circle cx="45" cy="60" r="6" fill="url(#touchAccent)"/>
</svg>
