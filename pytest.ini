[pytest]
# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Fixtures

# Output options
addopts = -v --tb=short --strict-markers

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (requires dependencies)
    e2e: End-to-end tests (full system)
    ci: CI/CD automatic tests (run on every commit)
    slow: Slow running tests
    requires_llm: Tests requiring LLM access
    requires_network: Tests requiring network access
    requires_blockchain: Tests requiring blockchain access
    agent: Agent lifecycle tests
    auth: Authentication tests
    wallet: Wallet tests
    staking: Staking tests
    matching: Matching tests
    collaboration: Collaboration tests
    workflow: Workflow tests
    governance: Governance tests
    transaction: Transaction tests
    environment: Environment tests
    learning: Learning tests
    network: Network tests
    blockchain: Blockchain tests
    websocket: WebSocket tests

# Logging
log_cli = false
log_cli_level = INFO

# Coverage
[coverage:run]
source = usmsb_sdk
omit =
    */tests/*
    */migrations/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
