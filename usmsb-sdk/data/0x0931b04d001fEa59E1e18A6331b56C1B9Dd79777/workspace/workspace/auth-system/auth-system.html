<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册登录系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            transition: all 0.3s ease;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .form-container {
            padding: 40px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .switch-mode {
            text-align: center;
            margin-top: 25px;
            color: #666;
        }
        .switch-mode a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .switch-mode a:hover {
            text-decoration: underline;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .user-info {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }
        .user-info h2 {
            color: #667eea;
            margin-bottom: 20px;
        }
        .user-info .info-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: left;
        }
        .user-info .info-item label {
            font-weight: 600;
            color: #666;
            display: block;
            margin-bottom: 5px;
        }
        .user-info .info-item span {
            color: #333;
        }
        .logout-btn {
            background: #dc3545;
            margin-top: 20px;
        }
        .logout-btn:hover {
            background: #c82333;
            box-shadow: 0 5px 20px rgba(220, 53, 69, 0.4);
        }
        .data-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        .data-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .user-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .user-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .user-item strong {
            color: #667eea;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="formTitle">用户登录</h1>
            <p id="formSubtitle">欢迎回来，请登录您的账号</p>
        </div>
        
        <div class="form-container" id="authForm">
            <div id="message" class="message hidden"></div>
            
            <form id="mainForm">
                <div class="form-group" id="emailGroup">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" placeholder="请输入邮箱地址">
                </div>
                
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" required>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                
                <button type="submit" class="btn" id="submitBtn">登录</button>
            </form>
            
            <div class="switch-mode">
                <span id="switchText">还没有账号？</span>
                <a id="switchLink">立即注册</a>
            </div>
            
            <div class="data-section">
                <h3>📋 已注册用户列表</h3>
                <div class="user-list" id="userList">
                    <p style="color: #999; font-size: 13px;">暂无注册用户</p>
                </div>
            </div>
        </div>
        
        <div class="form-container hidden" id="userInfo">
            <div class="user-info">
                <h2>🎉 登录成功！</h2>
                <div class="info-item">
                    <label>用户ID</label>
                    <span id="infoId">-</span>
                </div>
                <div class="info-item">
                    <label>用户名</label>
                    <span id="infoUsername">-</span>
                </div>
                <div class="info-item">
                    <label>邮箱</label>
                    <span id="infoEmail">-</span>
                </div>
                <div class="info-item">
                    <label>注册时间</label>
                    <span id="infoTime">-</span>
                </div>
                <button class="btn logout-btn" id="logoutBtn">退出登录</button>
            </div>
        </div>
    </div>

    <script>
        // 数据存储 - 使用 localStorage 模拟数据库
        const DB_KEY = 'auth_system_users';
        
        // 初始化数据库
        function initDB() {
            if (!localStorage.getItem(DB_KEY)) {
                localStorage.setItem(DB_KEY, JSON.stringify([]));
            }
        }
        
        // 读取所有用户
        function getUsers() {
            return JSON.parse(localStorage.getItem(DB_KEY) || '[]');
        }
        
        // 保存用户
        function saveUsers(users) {
            localStorage.setItem(DB_KEY, JSON.stringify(users));
        }
        
        // 显示消息
        function showMessage(text, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = `message ${type}`;
            msgEl.classList.remove('hidden');
            
            setTimeout(() => {
                msgEl.classList.add('hidden');
            }, 3000);
        }
        
        // 渲染用户列表
        function renderUserList() {
            const users = getUsers();
            const listEl = document.getElementById('userList');
            
            if (users.length === 0) {
                listEl.innerHTML = '<p style="color: #999; font-size: 13px;">暂无注册用户</p>';
                return;
            }
            
            listEl.innerHTML = users.map(u => `
                <div class="user-item">
                    <strong>${u.username}</strong> - ${u.email}<br>
                    <small style="color: #999;">注册时间: ${new Date(u.createdAt).toLocaleString()}</small>
                </div>
            `).join('');
        }
        
        // 当前模式: true = 登录, false = 注册
        let isLoginMode = true;
        let currentUser = null;
        
        // DOM 元素
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const emailGroup = document.getElementById('emailGroup');
        const submitBtn = document.getElementById('submitBtn');
        const switchText = document.getElementById('switchText');
        const switchLink = document.getElementById('switchLink');
        const mainForm = document.getElementById('mainForm');
        const authForm = document.getElementById('authForm');
        const userInfo = document.getElementById('userInfo');
        
        // 切换登录/注册模式
        function switchMode() {
            isLoginMode = !isLoginMode;
            
            if (isLoginMode) {
                formTitle.textContent = '用户登录';
                formSubtitle.textContent = '欢迎回来，请登录您的账号';
                emailGroup.classList.add('hidden');
                submitBtn.textContent = '登录';
                switchText.textContent = '还没有账号？';
                switchLink.textContent = '立即注册';
            } else {
                formTitle.textContent = '用户注册';
                formSubtitle.textContent = '创建一个新账号';
                emailGroup.classList.remove('hidden');
                submitBtn.textContent = '注册';
                switchText.textContent = '已有账号？';
                switchLink.textContent = '立即登录';
            }
            
            document.getElementById('message').classList.add('hidden');
        }
        
        switchLink.addEventListener('click', switchMode);
        
        // 表单提交
        mainForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value.trim();
            
            if (!username || !password) {
                showMessage('请填写所有必填项', 'error');
                return;
            }
            
            const users = getUsers();
            
            if (isLoginMode) {
                // 登录逻辑
                const user = users.find(u => u.username === username && u.password === password);
                
                if (user) {
                    currentUser = user;
                    showUserInfo(user);
                    showMessage('登录成功！', 'success');
                } else {
                    showMessage('用户名或密码错误', 'error');
                }
            } else {
                // 注册逻辑
                if (!email) {
                    showMessage('请填写邮箱', 'error');
                    return;
                }
                
                if (users.find(u => u.username === username)) {
                    showMessage('用户名已存在', 'error');
                    return;
                }
                
                if (users.find(u => u.email === email)) {
                    showMessage('邮箱已被注册', 'error');
                    return;
                }
                
                // 创建新用户
                const newUser = {
                    id: Date.now(),
                    username,
                    password,
                    email,
                    createdAt: new Date().toISOString()
                };
                
                users.push(newUser);
                saveUsers(users);
                
                showMessage('注册成功！请登录', 'success');
                renderUserList();
                
                // 切换到登录模式
                setTimeout(() => {
                    switchMode();
                    document.getElementById('username').value = username;
                }, 1000);
            }
        });
        
        // 显示用户信息
        function showUserInfo(user) {
            document.getElementById('infoId').textContent = user.id;
            document.getElementById('infoUsername').textContent = user.username;
            document.getElementById('infoEmail').textContent = user.email;
            document.getElementById('infoTime').textContent = new Date(user.createdAt).toLocaleString();
            
            authForm.classList.add('hidden');
            userInfo.classList.remove('hidden');
        }
        
        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', function() {
            currentUser = null;
            userInfo.classList.add('hidden');
            authForm.classList.remove('hidden');
            mainForm.reset();
        });
        
        // 初始化
        initDB();
        renderUserList();
    </script>
</body>
</html>
