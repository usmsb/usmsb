<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户注册登录系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      animation: slideIn 0.5s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    
    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-top: 15px;
      text-align: center;
      animation: fadeIn 0.3s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .switch {
      text-align: center;
      margin-top: 25px;
      color: #666;
    }
    
    .switch button {
      background: none;
      color: #667eea;
      padding: 0;
      font-size: 16px;
      width: auto;
      margin: 0;
    }
    
    .switch button:hover {
      text-decoration: underline;
      box-shadow: none;
      transform: none;
    }
    
    .user-info {
      text-align: center;
    }
    
    .user-info h2 {
      color: #28a745;
      margin-bottom: 20px;
    }
    
    .user-info .details {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    
    .user-info .details p {
      margin: 10px 0;
      color: #555;
    }
    
    .user-info .details strong {
      color: #333;
    }
    
    .logout-btn {
      background: #dc3545;
    }
    
    .logout-btn:hover {
      background: #c82333;
      box-shadow: 0 10px 20px rgba(220, 53, 69, 0.3);
    }
    
    .users-list {
      margin-top: 30px;
      border-top: 1px solid #e0e0e0;
      padding-top: 20px;
    }
    
    .users-list h3 {
      color: #333;
      margin-bottom: 15px;
    }
    
    .user-item {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <!-- Login Form -->
    <div id="login-form">
      <h1>用户登录</h1>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="login-username" required placeholder="请输入用户名">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="login-password" required placeholder="请输入密码">
        </div>
        <button type="submit">登录</button>
      </form>
      <div id="login-message"></div>
      <div class="switch">
        还没有账号？ <button onclick="showRegister()">立即注册</button>
      </div>
    </div>

    <!-- Register Form -->
    <div id="register-form" style="display: none;">
      <h1>用户注册</h1>
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="reg-username" required placeholder="请输入用户名">
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="reg-email" required placeholder="请输入邮箱">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="reg-password" required placeholder="请输入密码">
        </div>
        <button type="submit">注册</button>
      </form>
      <div id="register-message"></div>
      <div class="switch">
        已有账号？ <button onclick="showLogin()">立即登录</button>
      </div>
    </div>

    <!-- User Info -->
    <div id="user-info" class="user-info" style="display: none;">
      <h2>🎉 登录成功！</h2>
      <div class="details">
        <p><strong>用户ID:</strong> <span id="info-id"></span></p>
        <p><strong>用户名:</strong> <span id="info-username"></span></p>
        <p><strong>邮箱:</strong> <span id="info-email"></span></p>
      </div>
      <button class="logout-btn" onclick="handleLogout()">退出登录</button>
      
      <div class="users-list">
        <h3>所有用户列表</h3>
        <div id="users-list"></div>
      </div>
    </div>
  </div>

  <script>
    // 使用 localStorage 存储用户数据
    const USERS_KEY = 'auth_users';

    // 获取用户列表
    function getUsers() {
      const users = localStorage.getItem(USERS_KEY);
      return users ? JSON.parse(users) : [];
    }

    // 保存用户列表
    function saveUsers(users) {
      localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }

    // 显示登录表单
    function showLogin() {
      document.getElementById('login-form').style.display = 'block';
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('user-info').style.display = 'none';
      clearMessages();
    }

    // 显示注册表单
    function showRegister() {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('register-form').style.display = 'block';
      document.getElementById('user-info').style.display = 'none';
      clearMessages();
    }

    // 显示用户信息
    function showUserInfo(user) {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('register-form').style.display = 'none';
      document.getElementById('user-info').style.display = 'block';
      
      document.getElementById('info-id').textContent = user.id;
      document.getElementById('info-username').textContent = user.username;
      document.getElementById('info-email').textContent = user.email;
      
      // 显示所有用户列表
      displayUsersList();
      clearMessages();
    }

    // 显示用户列表
    function displayUsersList() {
      const users = getUsers();
      const listContainer = document.getElementById('users-list');
      
      if (users.length === 0) {
        listContainer.innerHTML = '<p style="color: #999;">暂无注册用户</p>';
        return;
      }
      
      listContainer.innerHTML = users.map(u => `
        <div class="user-item">
          <strong>${u.username}</strong> (${u.email})
        </div>
      `).join('');
    }

    // 清除消息
    function clearMessages() {
      document.getElementById('login-message').innerHTML = '';
      document.getElementById('register-message').innerHTML = '';
    }

    // 显示消息
    function showMessage(elementId, message, isSuccess) {
      const element = document.getElementById(elementId);
      element.innerHTML = `<div class="message ${isSuccess ? 'success' : 'error'}">${message}</div>`;
    }

    // 处理注册
    function handleRegister(event) {
      event.preventDefault();
      
      const username = document.getElementById('reg-username').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      
      const users = getUsers();
      
      // 检查用户名是否存在
      if (users.find(u => u.username === username)) {
        showMessage('register-message', '用户名已存在！', false);
        return;
      }
      
      // 检查邮箱是否存在
      if (users.find(u => u.email === email)) {
        showMessage('register-message', '邮箱已被注册！', false);
        return;
      }
      
      // 创建新用户
      const newUser = {
        id: Date.now(),
        username,
        email,
        password, // 注意：生产环境应该加密存储
        createdAt: new Date().toISOString()
      };
      
      users.push(newUser);
      saveUsers(users);
      
      showMessage('register-message', '注册成功！请登录', true);
      
      // 清空表单
      document.getElementById('reg-username').value = '';
      document.getElementById('reg-email').value = '';
      document.getElementById('reg-password').value = '';
      
      // 3秒后自动切换到登录页面
      setTimeout(() => {
        showLogin();
      }, 2000);
    }

    // 处理登录
    function handleLogin(event) {
      event.preventDefault();
      
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      
      const users = getUsers();
      const user = users.find(u => u.username === username && u.password === password);
      
      if (!user) {
        showMessage('login-message', '用户名或密码错误！', false);
        return;
      }
      
      // 保存当前登录用户
      sessionStorage.setItem('currentUser', JSON.stringify(user));
      
      showUserInfo(user);
    }

    // 处理退出登录
    function handleLogout() {
      sessionStorage.removeItem('currentUser');
      document.getElementById('login-username').value = '';
      document.getElementById('login-password').value = '';
      showLogin();
    }

    // 页面加载时检查是否已登录
    window.onload = function() {
      const currentUser = sessionStorage.getItem('currentUser');
      if (currentUser) {
        showUserInfo(JSON.parse(currentUser));
      }
    };
  </script>
</body>
</html>
