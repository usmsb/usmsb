# SupplierAgent Configuration
# 供给报价 Agent 配置文件

agent:
  id: "supplier_new_001"
  name: "钢材供应商Agent"
  description: "提供钢材等金属材料的报价服务"
  version: "1.0.0"

# 平台连接配置
platform:
  url: "${PLATFORM_URL:http://localhost:8080}"
  api_key: "${PLATFORM_API_KEY:}"
  auto_register: true
  heartbeat_interval: 30
  reconnect_interval: 5
  max_reconnect_attempts: 10

# Redis 配置
redis:
  url: "${REDIS_URL:redis://localhost:6379}"
  channel: "supply_chain_quotes"

# 能力声明
capabilities:
  - "quote_response"
  - "product_inquiry"
  - "inventory_query"
  - "bulk_pricing"

# 商品库存配置
products:
  - id: "steel_001"
    name: "钢板 Q235"
    base_price: 4500.00
    available_quantity: 5000
    unit: "吨"
    min_order_quantity: 10
    max_order_quantity: 1000
    lead_time_days: 7
    specifications:
      thickness: "10mm"
      width: "2000mm"
      length: "6000mm"
      standard: "GB/T 700-2006"

  - id: "steel_002"
    name: "螺纹钢 HRB400"
    base_price: 4200.00
    available_quantity: 3000
    unit: "吨"
    min_order_quantity: 5
    max_order_quantity: 500
    lead_time_days: 5
    specifications:
      diameter: "16mm"
      length: "12000mm"
      standard: "GB/T 1499.2-2018"

  - id: "steel_003"
    name: "角钢 Q235"
    base_price: 4300.00
    available_quantity: 2000
    unit: "吨"
    min_order_quantity: 5
    max_order_quantity: 300
    lead_time_days: 5
    specifications:
      size: "50x50x5mm"
      length: "6000mm"

  - id: "copper_001"
    name: "铜板 T2"
    base_price: 68000.00
    available_quantity: 200
    unit: "吨"
    min_order_quantity: 1
    max_order_quantity: 50
    lead_time_days: 14
    specifications:
      thickness: "5mm"
      standard: "GB/T 2040-2017"

  - id: "aluminum_001"
    name: "铝板 6061"
    base_price: 22000.00
    available_quantity: 500
    unit: "吨"
    min_order_quantity: 1
    max_order_quantity: 100
    lead_time_days: 10
    specifications:
      thickness: "3mm"
      standard: "GB/T 3880-2012"

# 报价策略配置
pricing_strategy:
  # 数量折扣阶梯
  quantity_discounts:
    - min_quantity: 50
      discount: 0.02
    - min_quantity: 100
      discount: 0.03
    - min_quantity: 200
      discount: 0.05
    - min_quantity: 500
      discount: 0.10

  # 紧急订单加价
  urgency_factors:
    critical: 1.20      # 加价 20%
    urgent: 1.15        # 加价 15%
    normal: 1.00        # 不加价

  # 报价有效期（小时）
  quote_validity_hours: 48

  # 市场价格调整因子
  market_adjustment_factor: 1.0

# 日志配置
logging:
  level: "${LOG_LEVEL:INFO}"
  format: "json"
  output: "stdout"

# 服务配置
server:
  host: "0.0.0.0"
  port: 8001

# 超时配置
timeouts:
  request_timeout: 30
  response_timeout: 10
  connection_timeout: 5
