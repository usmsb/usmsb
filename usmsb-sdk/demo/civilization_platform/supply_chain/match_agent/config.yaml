# MatchAgent Configuration
# 交易撮合 Agent 配置文件

agent:
  id: "match_new_001"
  name: "撮合Agent"
  description: "匹配买卖双方，撮合交易"
  version: "1.0.0"

# 平台连接配置
platform:
  url: "${PLATFORM_URL:http://localhost:8080}"
  api_key: "${PLATFORM_API_KEY:}"
  auto_register: true
  heartbeat_interval: 30
  reconnect_interval: 5
  max_reconnect_attempts: 10

# Redis 配置
redis:
  url: "${REDIS_URL:redis://localhost:6379}"
  channel: "supply_chain_matching"

# 能力声明
capabilities:
  - "match_request"
  - "match_result"
  - "match_confirm"
  - "match_reject"
  - "price_negotiation"

# 撮合配置
matching:
  # 开始撮合的最少报价数
  min_quotes_to_match: 1

  # 最大等待报价数
  max_quotes_to_wait: 10

  # 等待报价的超时时间（秒）
  quote_wait_timeout: 300

  # 最低匹配分数阈值
  min_match_score: 0.5

  # 自动撮合配置
  auto_match:
    enabled: true
    # 自动撮合的最低分数
    threshold: 0.7

  # 评分权重
  score_weights:
    price: 0.4
    quantity: 0.2
    delivery: 0.25
    supplier: 0.15

# 价格协商配置
negotiation:
  # 是否启用价格协商
  enabled: true

  # 最大协商轮次
  max_rounds: 3

  # 协商折扣范围
  discount_range:
    min: 0.0
    max: 0.05

  # 高匹配度额外折扣
  bonus_discount:
    excellent: 0.02   # 评分 >= 0.9
    good: 0.01        # 评分 >= 0.8

# 撮合有效期配置
validity:
  # 默认有效期（小时）
  default_hours: 24

  # 最大有效期（小时）
  max_hours: 72

  # 过期检查间隔（秒）
  expiry_check_interval: 60

# 撮合策略配置
strategies:
  # 价格优先策略
  price_first:
    weights:
      price: 0.6
      quantity: 0.15
      delivery: 0.15
      supplier: 0.1

  # 交货优先策略
  delivery_first:
    weights:
      price: 0.2
      quantity: 0.2
      delivery: 0.5
      supplier: 0.1

  # 均衡策略（默认）
  balanced:
    weights:
      price: 0.4
      quantity: 0.2
      delivery: 0.25
      supplier: 0.15

# 通知配置
notifications:
  # 撮合成功通知
  on_match_created: true

  # 确认通知
  on_match_confirmed: true

  # 拒绝通知
  on_match_rejected: true

  # 过期通知
  on_match_expired: true

# 日志配置
logging:
  level: "${LOG_LEVEL:INFO}"
  format: "json"
  output: "stdout"

# 服务配置
server:
  host: "0.0.0.0"
  port: 8004

# 超时配置
timeouts:
  request_timeout: 30
  response_timeout: 10
  connection_timeout: 5

# 数据持久化配置
persistence:
  enabled: false
  database_url: "${DATABASE_URL:}"
  # 保留历史记录天数
  retention_days: 30

# 性能配置
performance:
  # 最大并发撮合数
  max_concurrent_matches: 100

  # 批量处理大小
  batch_size: 10
